    <style>
    * {
        font-family: 'Space Mono', monospace !important;
    }
    html, body, #map {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
    }

    /* HEADING */
    #map-heading {
        position: fixed;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: rgba(0,0,0,0.82);
        border-left: 4px solid #e63946;
        border-right: 4px solid #e63946;
        padding: 10px 28px;
        text-align: center;
        pointer-events: none;
        white-space: nowrap;
    }
    #map-heading .title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #e63946;
        letter-spacing: 4px;
        text-transform: uppercase;
    }
    #map-heading .subtitle {
        font-size: 0.55rem;
        color: #aaaaaa;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 4px;
    }

    /* LOGO + ORG NAME */
    #map-logo {
        position: fixed;
        bottom: 15px;
        left: 15px;
        z-index: 9999;
        background: rgba(0,0,0,0.82);
        border-left: 4px solid #e63946;
        padding: 10px 14px;
        text-align: center;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }
    #map-logo img {
        width: 52px;
        height: 52px;
        object-fit: contain;
    }
    #map-logo .org-name {
        font-size: 0.48rem;
        font-weight: 700;
        color: #c9a98a;
        letter-spacing: 2px;
        text-transform: uppercase;
        line-height: 1.5;
        text-align: center;
    }

    /* CREDIT */
    #map-credit {
        position: fixed;
        bottom: 15px;
        right: 15px;
        z-index: 9999;
        background: rgba(0,0,0,0.75);
        color: #ffffff;
        font-size: 0.65rem;
        letter-spacing: 2px;
        padding: 6px 12px;
        border-left: 3px solid #e63946;
        pointer-events: none;
    }

    /* POPUP FLAGS */
    .flag-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255,255,255,0.04);
        border-radius: 4px;
        padding: 10px 14px;
        margin-bottom: 10px;
        border: 1px solid #2a2a2a;
    }
    .flag-box { text-align: center; }
    .flag-emoji { font-size: 2.8rem; line-height: 1; }
    .flag-label { font-size: 0.42rem; color: #888; letter-spacing: 1px; margin-top: 4px; text-transform: uppercase; }
    .flag-country { font-size: 0.52rem; color: #e8e8e8; font-weight: bold; margin-top: 2px; }
    .flag-arrow { font-size: 1.4rem; color: #e63946; }
    </style>
    <title>Global Tear Gas Incident Tracker</title>

    img.emoji {
        height: 2.8em !important;
        width: 2.8em !important;
        margin: 0 !important;
        vertical-align: middle !important;
    }
    </style>
